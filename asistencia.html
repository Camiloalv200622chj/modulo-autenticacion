<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - Colegio San José</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="asistencia-page">
    <nav class="sidebar">
        <div class="logo">CSJ</div>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="asistencia.html">Asistencia</a></li>
            <li><a href="#" onclick="logout()">Cerrar Sesión</a></li>
        </ul>
    </nav>
    <main class="content">
        <header>
            <h1>Control de Asistencia</h1>
        </header>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Estudiante</th>
                        <th>Grado</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Juan Pérez</td>
                        <td>10-A</td>
                        <td><span class="status present">Presente</span></td>
                        <td><button class="btn-check">Justificar</button></td>
                    </tr>
                    <tr>
                        <td>Maria López</td>
                        <td>10-A</td>
                        <td><span class="status missing">Ausente</span></td>
                        <td><button class="btn-check">Justificar</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script>
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
